data:
  processed_dir: data/processed
  sequence_length: 20
  test_end: '2025-12-31'
  test_start: '2019-01-01'
  train_end: '2017-12-31'
  train_start: '2010-01-01'
  use_macro: true
  val_end: '2018-12-31'
  val_start: '2018-01-01'
evaluation:
  drop_n: 5
  risk_aversion_eta: 1.0
  top_k: 50
model:
  hidden_dim: 20
  leaky_relu_slope: 0.1
  macro_dim: 10
  macro_dropout: 0.1
  macro_hidden_dim: 16
  num_factors: 8
  num_features: 20
  num_portfolios: 64
training:
  gamma: 1.0
  kl_warmup_steps: 2000
  learning_rate: 0.001
  macro_lr: 0.0005
  max_epochs: 10
  seed: 42
  sigma_floor: 1.0e-06
  weight_decay: 0.0001

data:
  processed_dir: data/processed
  train_start: "2010-01-01"
  train_end: "2017-12-31"
  val_start: "2018-01-01"
  val_end: "2018-12-31"
  test_start: "2019-01-01"
  test_end: "2025-12-31"
  sequence_length: 20

model:
  num_features: 20
  hidden_dim: 20
  num_factors: 8
  num_portfolios: 64
  leaky_relu_slope: 0.1

training:
  batch_size: 1
  max_epochs: 1
  learning_rate: 1.0e-3
  gamma: 1.0
  seed: 42
  sigma_floor: 1.0e-6

evaluation:
  top_k: 50
  drop_n: 5
  risk_aversion_eta: 1.0
